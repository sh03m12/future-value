<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>価値観変遷年表 — 事業・R&D戦略マップ</title>
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1e293b;--surface3:#283548;
  --border:#334155;--border-light:#475569;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;
  --accent:#3b82f6;--accent2:#8b5cf6;--accent3:#06b6d4;
  --preindustrial:#e11d48;--preindustrial-bg:rgba(225,29,72,.08);--preindustrial-border:rgba(225,29,72,.25);
  --past:#f59e0b;--past-bg:rgba(245,158,11,.08);--past-border:rgba(245,158,11,.25);
  --present:#10b981;--present-bg:rgba(16,185,129,.08);--present-border:rgba(16,185,129,.25);
  --future:#8b5cf6;--future-bg:rgba(139,92,246,.08);--future-border:rgba(139,92,246,.25);
  --signal-strong:#22c55e;--signal-weak:#eab308;--signal-hypo:#ef4444;
  --radius:12px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --transition:all .3s cubic-bezier(.4,0,.2,1);
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP","Segoe UI",system-ui,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}

/* ========== HEADER ========== */
.hero{position:relative;overflow:hidden;padding:3rem 2rem 2rem;
  background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0c1631 100%)}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,.12),transparent 60%),
             radial-gradient(ellipse at 70% 80%,rgba(139,92,246,.1),transparent 50%)}
.hero-inner{position:relative;max-width:1400px;margin:0 auto}
.hero h1{font-size:2.2rem;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,#60a5fa,#a78bfa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--text-dim);font-size:.95rem;margin-top:.5rem;max-width:700px}
.hero-meta{display:flex;gap:1.5rem;margin-top:1.2rem;flex-wrap:wrap}
.hero-meta span{font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:.35rem}
.hero-meta span::before{content:'';width:6px;height:6px;border-radius:50%}
.hero-meta .m-preindustrial::before{background:var(--preindustrial)}
.hero-meta .m-past::before{background:var(--past)}
.hero-meta .m-present::before{background:var(--present)}
.hero-meta .m-future::before{background:var(--future)}

/* ========== CONTROLS ========== */
.controls{position:sticky;top:0;z-index:100;
  background:rgba(10,14,26,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:.8rem 2rem}
.controls-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.filter-group{display:flex;gap:.4rem;flex-wrap:wrap}
.filter-btn{padding:.35rem .85rem;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:.78rem;cursor:pointer;
  transition:var(--transition);font-family:inherit;white-space:nowrap}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.search-box{margin-left:auto;position:relative}
.search-box input{width:240px;padding:.45rem 1rem .45rem 2.2rem;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:.82rem;font-family:inherit;outline:none;transition:var(--transition)}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.search-box svg{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--text-muted)}
.view-toggle{display:flex;gap:.3rem;margin-left:.5rem}
.view-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:var(--transition)}
.view-btn:hover{border-color:var(--accent);color:var(--accent)}
.view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ========== MAIN ========== */
.main{max-width:1400px;margin:0 auto;padding:1.5rem 2rem 4rem}

/* ========== TIMELINE VIEW ========== */
.timeline-grid{display:none;gap:1.2rem}
.timeline-grid.active{display:grid}
.category-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:var(--transition)}
.category-row:hover{border-color:var(--border-light)}
.category-row.hidden{display:none}
.category-header{display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.2rem;cursor:pointer;user-select:none;transition:var(--transition)}
.category-header:hover{background:rgba(255,255,255,.02)}
.cat-left{display:flex;align-items:center;gap:.8rem}
.cat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:1.3rem;flex-shrink:0}
.cat-title{font-size:1.05rem;font-weight:700}
.cat-subtitle{font-size:.75rem;color:var(--text-muted);margin-top:.1rem}
.cat-chevron{width:20px;height:20px;color:var(--text-muted);transition:transform .3s ease;flex-shrink:0}
.category-row.open .cat-chevron{transform:rotate(180deg)}

.era-cards{display:none;padding:0 1.2rem 1.2rem;gap:1rem}
.category-row.open .era-cards{display:grid;grid-template-columns:repeat(4,1fr)}
@media(max-width:1200px){.category-row.open .era-cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.category-row.open .era-cards{grid-template-columns:1fr}}

.era-card{border-radius:var(--radius-sm);padding:1.1rem;position:relative;overflow:hidden;
  transition:var(--transition)}
.era-card:hover{transform:translateY(-1px)}
.era-card.preindustrial{background:var(--preindustrial-bg);border:1px solid var(--preindustrial-border)}
.era-card.past{background:var(--past-bg);border:1px solid var(--past-border)}
.era-card.present{background:var(--present-bg);border:1px solid var(--present-border)}
.era-card.future{background:var(--future-bg);border:1px solid var(--future-border)}

.era-label{display:inline-flex;align-items:center;gap:.35rem;font-size:.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:.8rem;padding:.2rem .6rem;
  border-radius:4px}
.preindustrial .era-label{color:var(--preindustrial);background:rgba(225,29,72,.12)}
.past .era-label{color:var(--past);background:rgba(245,158,11,.12)}
.present .era-label{color:var(--present);background:rgba(16,185,129,.12)}
.future .era-label{color:var(--future);background:rgba(139,92,246,.12)}

.field{margin-bottom:.75rem}
.field:last-child{margin-bottom:0}
.field-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-muted);margin-bottom:.25rem;display:flex;align-items:center;gap:.3rem}
.field-label .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.field-content{font-size:.82rem;color:var(--text-dim);line-height:1.65}

.signal-tag{display:inline-block;font-size:.68rem;font-weight:700;padding:.15rem .5rem;
  border-radius:3px;margin-right:.3rem;margin-bottom:.2rem}
.signal-tag.strong{color:var(--signal-strong);background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25)}
.signal-tag.weak{color:var(--signal-weak);background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.25)}
.signal-tag.hypo{color:var(--signal-hypo);background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25)}

.scenario-box{margin-top:.3rem;padding:.5rem .7rem;border-radius:6px;font-size:.78rem;line-height:1.6}
.scenario-box.optimistic{background:rgba(34,197,94,.06);border-left:3px solid var(--signal-strong);color:var(--text-dim)}
.scenario-box.pessimistic{background:rgba(239,68,68,.06);border-left:3px solid var(--signal-hypo);color:var(--text-dim)}

.needs-tag,.strategy-keyword{display:inline-block;font-size:.7rem;padding:.2rem .5rem;border-radius:4px;
  margin:.15rem .2rem .15rem 0;cursor:pointer;transition:var(--transition);position:relative}
.needs-tag{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);color:var(--accent2)}
.needs-tag:hover{background:rgba(139,92,246,.2);border-color:rgba(139,92,246,.4)}
.needs-tag.active{background:rgba(139,92,246,.25);border-color:rgba(139,92,246,.5)}
.strategy-keyword{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--accent)}
.strategy-keyword:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.4)}
.strategy-keyword.active{background:rgba(59,130,246,.25);border-color:rgba(59,130,246,.5)}
.accordion-story{display:none;margin-top:.4rem;margin-bottom:.3rem;padding:.6rem .8rem;border-radius:6px;
  font-size:.76rem;color:var(--text-dim);line-height:1.7;animation:fadeIn .3s ease}
.accordion-story.visible{display:block}
.accordion-story.strategy-type{background:rgba(59,130,246,.06);border-left:3px solid var(--accent)}
.accordion-story.needs-type{background:rgba(139,92,246,.06);border-left:3px solid var(--accent2)}
.accordion-story-title{font-weight:700;margin-bottom:.2rem;font-size:.72rem}
.accordion-story.strategy-type .accordion-story-title{color:var(--accent)}
.accordion-story.needs-type .accordion-story-title{color:var(--accent2)}

/* ========== TABLE VIEW ========== */
.table-view{display:none}
.table-view.active{display:block}
.table-wrap{overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:.8rem}
.data-table thead th{background:var(--surface);
  padding:.8rem;text-align:left;font-weight:700;border-bottom:2px solid var(--border);
  white-space:nowrap}
.data-table thead th:first-child{min-width:120px}
.data-table tbody td{padding:.7rem .8rem;border-bottom:1px solid var(--border);
  vertical-align:top;color:var(--text-dim);line-height:1.6;min-width:220px}
.data-table tbody td:first-child{position:sticky;left:0;background:var(--surface);
  font-weight:700;color:var(--text);z-index:5;white-space:nowrap}
.data-table tbody tr:hover td{background:rgba(255,255,255,.02)}
.data-table .col-preindustrial{border-left:2px solid var(--preindustrial-border)}
.data-table .col-past{border-left:2px solid var(--past-border)}
.data-table .col-present{border-left:2px solid var(--present-border)}
.data-table .col-future{border-left:2px solid var(--future-border)}

/* ========== SIDEBAR DETAIL ========== */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  backdrop-filter:blur(4px)}
.overlay.active{display:block}
.detail-panel{position:fixed;top:0;right:-520px;width:500px;max-width:90vw;height:100vh;
  background:var(--surface);z-index:210;transition:right .4s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.5);border-left:1px solid var(--border)}
.detail-panel.active{right:0}
.detail-close{position:absolute;top:1rem;right:1rem;width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:var(--surface2);color:var(--text);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  transition:var(--transition);z-index:5}
.detail-close:hover{background:var(--accent);border-color:var(--accent)}
.detail-content{padding:2rem 1.5rem}
.detail-content h2{font-size:1.3rem;font-weight:800;margin-bottom:.3rem}
.detail-content .detail-era{font-size:.8rem;font-weight:600;padding:.2rem .6rem;
  border-radius:4px;display:inline-block;margin-bottom:1.2rem}
.detail-section{margin-bottom:1.5rem}
.detail-section h3{font-size:.85rem;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;
  padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.detail-section p,.detail-section ul{font-size:.85rem;color:var(--text-dim);line-height:1.7}
.detail-section ul{padding-left:1.2rem}
.detail-section li{margin-bottom:.3rem}

/* ========== TABLE COLUMN TOGGLES ========== */
.table-col-toggles{display:none;gap:.4rem;flex-wrap:wrap;align-items:center}
.table-col-toggles.active{display:flex}
.table-col-toggles .toggle-label{font-size:.72rem;color:var(--text-muted);margin-right:.2rem;white-space:nowrap}
.col-toggle{padding:.25rem .65rem;border-radius:14px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:.72rem;cursor:pointer;
  transition:var(--transition);font-family:inherit;white-space:nowrap}
.col-toggle:hover{border-color:var(--accent);color:var(--accent)}
.col-toggle.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ========== FOOTER ========== */
.page-footer{max-width:1400px;margin:0 auto;padding:2rem;
  border-top:1px solid var(--border);text-align:center}
.page-footer p{font-size:.75rem;color:var(--text-muted)}

/* ========== ANIMATIONS ========== */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.category-row{animation:fadeIn .4s ease both}
.category-row:nth-child(2){animation-delay:.05s}
.category-row:nth-child(3){animation-delay:.1s}
.category-row:nth-child(4){animation-delay:.15s}
.category-row:nth-child(5){animation-delay:.2s}
.category-row:nth-child(6){animation-delay:.25s}
.category-row:nth-child(7){animation-delay:.3s}
.category-row:nth-child(8){animation-delay:.35s}
.category-row:nth-child(9){animation-delay:.4s}
.category-row:nth-child(10){animation-delay:.45s}
.category-row:nth-child(11){animation-delay:.5s}

/* highlight */
.highlight{background:rgba(59,130,246,.25);border-radius:2px;padding:0 2px}

@media(max-width:768px){
  html{font-size:14px}
  .hero{padding:2rem 1rem 1.5rem}
  .hero h1{font-size:1.6rem}
  .controls{padding:.6rem 1rem}
  .main{padding:1rem}
  .search-box input{width:160px}
}
</style>
</head>
<body>

<!-- ===== HERO ===== -->
<header class="hero">
  <div class="hero-inner">
    <h1>価値観変遷年表</h1>
    <p>事業・R&D戦略マップ — 構造変化の前提条件と未来シナリオを統合した戦略検討フレーム</p>
    <div class="hero-meta">
      <span class="m-preindustrial">古代〜前近代：産業革命以前</span>

      <span class="m-present">現在：2000年代〜現在</span>
      <span class="m-future">未来：2030〜2050年代</span>

  </div>
</header>

<!-- ===== CONTROLS ===== -->
<nav class="controls">
  <div class="controls-inner">
    <div class="filter-group" id="eraFilter">
      <button class="filter-btn active" data-era="all">すべて</button>
      <button class="filter-btn" data-era="preindustrial">前近代</button>
      <button class="filter-btn" data-era="past">過去</button>
      <button class="filter-btn" data-era="present">現在</button>
      <button class="filter-btn" data-era="future">未来</button>
    </div>
    <div class="filter-group" id="fieldFilter">
      <button class="filter-btn active" data-field="all">全項目</button>
      <button class="filter-btn" data-field="value">価値観</button>
      <button class="filter-btn" data-field="premise">成立前提</button>
      <button class="filter-btn" data-field="driver">転換要因</button>
      <button class="filter-btn" data-field="signal">兆候</button>
      <button class="filter-btn" data-field="strategy">事業・R&D</button>
    </div>
    <div class="table-col-toggles" id="tableColToggles">
      <span class="toggle-label">表示列:</span>
      <button class="col-toggle active" data-col="value">概要</button>
      <button class="col-toggle" data-col="premise">成立前提</button>
      <button class="col-toggle" data-col="driver">転換要因</button>
      <button class="col-toggle" data-col="signal">兆候</button>
      <button class="col-toggle active" data-col="strategy">事業・R&D</button>
      <button class="col-toggle" data-col="needs">未充足ニーズ</button>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="キーワード検索…">
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="card" title="カード表示">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="view-btn" data-view="table" title="テーブル表示">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/><path d="M9 3v18"/></svg>
      </button>
    </div>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<main class="main">
  <div class="timeline-grid active" id="cardView"></div>
  <div class="table-view" id="tableView"></div>
</main>

<!-- ===== DETAIL PANEL ===== -->
<div class="overlay" id="overlay"></div>
<aside class="detail-panel" id="detailPanel">
  <button class="detail-close" id="detailClose">&times;</button>
  <div class="detail-content" id="detailContent"></div>
</aside>

<!-- ===== FOOTER ===== -->
<footer class="page-footer">
  <p>Generated by Claude Agent Team — 5-agent collaborative analysis pipeline</p>
</footer>

          "AI故人と遺族の健全な関係構築":"AI再現された故人との対話が、悲嘆の癒しになるか依存を生むかは紙一重。「死を受容するプロセス」を阻害するリスクと、「故人との新しい関係性」の可能性の間で、心理学的ガイドラインが必要。",
          "死の意味の再構築":"生物学的死が「選択可能」「延期可能」「回避可能」になった時、「有限であるからこそ生に意味がある」という従来の実存的前提が崩壊する。不死の時代における生の意味を哲学的に再構築する必要。",
          "「消える権利」の保障":"デジタル不死が標準化された社会で、「完全に消えたい」「忘れられたい」という欲求を保障する権利。デジタルデータの完全消去・AI人格の終了・追悼空間からの撤去など、「死ぬ権利」の新しい形。"
        }
      }
    }
  }
];

// ========== RENDERING ==========
const cardView = document.getElementById('cardView');
const tableView = document.getElementById('tableView');

let activeEra = 'all';
let activeField = 'all';
let searchTerm = '';
let currentView = 'card';
let tableCols = {value:true, premise:false, driver:false, signal:false, strategy:true, needs:false};

function renderCards(){
  cardView.innerHTML = '';
  DATA.forEach(cat => {
    const row = document.createElement('div');
    row.className = 'category-row';
    row.dataset.category = cat.id;

    // Check search match
    const fullText = JSON.stringify(cat).toLowerCase();
    if(searchTerm && !fullText.includes(searchTerm.toLowerCase())){
      row.classList.add('hidden');
    }

    row.innerHTML = `
      <div class="category-header" onclick="toggleCategory(this)">
        <div class="cat-left">
          <div class="cat-icon" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div>
          <div><div class="cat-title">${cat.title}</div><div class="cat-subtitle">${cat.subtitle}</div></div>
        </div>
        <svg class="cat-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="era-cards">
        ${renderEraCard(cat, 'preindustrial', '前近代', '古代〜産業革命以前')}
        ${renderEraCard(cat, 'past', '過去', '産業革命〜20世紀後半')}
        ${renderEraCard(cat, 'present', '現在', '2000年代〜現在')}
        ${renderEraCard(cat, 'future', '未来', '2030〜2050年代')}
      </div>`;
    cardView.appendChild(row);
  });
}

function renderEraCard(cat, era, label, sub){
  const d = cat.eras[era];
  const hidden = activeEra !== 'all' && activeEra !== era ? 'style="display:none"' : '';

  let html = `<div class="era-card ${era}" ${hidden}>`;
  html += `<div class="era-label">${label}<span style="font-weight:400;opacity:.7;margin-left:.3rem;font-size:.65rem">${sub}</span></div>`;

  // Value
  if(shouldShow('value')){
    html += `<div class="field"><div class="field-label"><span class="dot" style="background:${cat.color}"></span>価値観</div>`;
    html += `<div class="field-content">${highlightText(d.value)}</div></div>`;
  }

  // Signals (future only)
  if(era === 'future' && d.signals && shouldShow('signal')){
    html += `<div class="field"><div class="field-label"><span class="dot" style="background:var(--signal-strong)"></span>確度別兆候</div><div class="field-content">`;
    html += `<span class="signal-tag strong">強い兆候</span> ${highlightText(d.signals.strong.join('、'))}<br>`;
    html += `<span class="signal-tag weak">弱い兆候</span> ${highlightText(d.signals.weak.join('、'))}<br>`;
    html += `<div class="scenario-box optimistic"><strong>楽観：</strong>${highlightText(d.signals.hypothesis.optimistic)}</div>`;
    html += `<div class="scenario-box pessimistic"><strong>悲観：</strong>${highlightText(d.signals.hypothesis.pessimistic)}</div>`;
    html += `</div></div>`;
  }

  // Premise
  if(shouldShow('premise')){
    html += `<div class="field"><div class="field-label"><span class="dot" style="background:#64748b"></span>成立前提</div>`;
    html += `<div class="field-content">${d.premise.map(p => highlightText(p)).join('<br>')}</div></div>`;
  }

  // Driver
  if(shouldShow('driver')){
    html += `<div class="field"><div class="field-label"><span class="dot" style="background:#ef4444"></span>転換要因</div>`;
    html += `<div class="field-content">${d.driver.map(x => highlightText(x)).join('、')}</div></div>`;
  }

  // Signal (past/present)
  if(era !== 'future' && d.signal && shouldShow('signal')){
    html += `<div class="field"><div class="field-label"><span class="dot" style="background:var(--signal-weak)"></span>次の兆候</div>`;
    html += `<div class="field-content">${d.signal.map(x => highlightText(x)).join('、')}</div></div>`;
  }

  // Strategy
  if(shouldShow('strategy')){
    const sId = `strat-${cat.id}-${era}`;
    html += `<div class="field"><div class="field-label"><span class="dot" style="background:var(--accent)"></span>事業・R&D示唆</div>`;
    html += `<div class="field-content">${d.strategy.map((s,i) => {
      const hasDetail = d.strategyDetail && d.strategyDetail[s];
      const tag = hasDetail
        ? `<span class="strategy-keyword" onclick="toggleAccordion('${sId}-${i}',this)">${highlightText(s)}</span>`
        : `<span class="strategy-keyword" style="cursor:default;opacity:.7">${highlightText(s)}</span>`;
      const story = hasDetail
        ? `<div class="accordion-story strategy-type" id="${sId}-${i}"><div class="accordion-story-title">詳細</div>${highlightText(d.strategyDetail[s])}</div>`
        : '';
      return tag + story;
    }).join('')}</div></div>`;
    if(d.needs){
      const nId = `needs-${cat.id}-${era}`;
      html += `<div class="field"><div class="field-label"><span class="dot" style="background:var(--accent2)"></span>未充足ニーズ</div>`;
      html += `<div class="field-content">${d.needs.map((n,i) => {
        const hasCtx = d.needsContext && d.needsContext[n];
        const tag = hasCtx
          ? `<span class="needs-tag" onclick="toggleAccordion('${nId}-${i}',this)">${highlightText(n)}</span>`
          : `<span class="needs-tag" style="cursor:default;opacity:.7">${highlightText(n)}</span>`;
        const story = hasCtx
          ? `<div class="accordion-story needs-type" id="${nId}-${i}"><div class="accordion-story-title">背景ストーリー</div>${highlightText(d.needsContext[n])}</div>`
          : '';
        return tag + story;
      }).join('')}</div></div>`;
    }
  }

  html += `</div>`;
  return html;
}

function shouldShow(field){
  return activeField === 'all' || activeField === field;
}

function highlightText(text){
  if(!searchTerm) return text;
  const re = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<span class="highlight">$1</span>');
}

// Table view
function renderTable(){
  const eras = ['preindustrial','past','present','future'];
  const eraLabels = {preindustrial:'前近代', past:'過去', present:'現在', future:'未来'};
  const visibleEras = eras.filter(e => activeEra === 'all' || activeEra === e);

  // Check if any column is active
  const anyCols = Object.values(tableCols).some(v => v);
  if(!anyCols){ tableView.innerHTML = '<p style="padding:2rem;color:var(--text-muted);text-align:center">表示する列を選択してください</p>'; return; }

  let html = '<div class="table-wrap"><table class="data-table"><thead><tr><th>カテゴリ</th>';
  visibleEras.forEach(e => {
    html += '<th class="col-'+e+'">'+eraLabels[e]+'</th>';
  });
  html += '</tr></thead><tbody>';

  DATA.forEach(cat => {
    const fullText = JSON.stringify(cat).toLowerCase();
    if(searchTerm && !fullText.includes(searchTerm.toLowerCase())) return;

    html += '<tr><td>'+cat.icon+' '+cat.title+'</td>';
    visibleEras.forEach(e => {
      const d = cat.eras[e];
      html += '<td class="col-'+e+'">';
      let sections = [];

      // 概要
      if(tableCols.value){
        sections.push('<div class="field-content" style="margin-bottom:.5rem"><strong>'+highlightText(d.value)+'</strong></div>');
      }

      // 成立前提
      if(tableCols.premise){
        let s = '<div style="margin-bottom:.5rem"><div style="font-size:.68rem;font-weight:700;color:var(--text-muted);margin-bottom:.2rem">成立前提</div><div class="field-content" style="font-size:.78rem;color:var(--text-dim)">';
        s += d.premise.map(p => '・'+highlightText(p)).join('<br>');
        s += '</div></div>';
        sections.push(s);
      }

      // 転換要因
      if(tableCols.driver){
        let s = '<div style="margin-bottom:.5rem"><div style="font-size:.68rem;font-weight:700;color:var(--text-muted);margin-bottom:.2rem">転換要因</div><div class="field-content" style="font-size:.78rem;color:var(--text-dim)">';
        s += d.driver.map(dr => '・'+highlightText(dr)).join('<br>');
        s += '</div></div>';
        sections.push(s);
      }

      // 兆候
      if(tableCols.signal){
        let s = '<div style="margin-bottom:.5rem"><div style="font-size:.68rem;font-weight:700;color:var(--text-muted);margin-bottom:.2rem">兆候</div><div class="field-content">';
        const signals = d.signals || d.signal;
        if(Array.isArray(signals)){
          signals.forEach(sig => {
            const cls = sig.level === 'strong' ? 'strong' : sig.level === 'weak' ? 'weak' : 'hypo';
            s += '<span class="signal-tag '+cls+'">'+highlightText(sig.text)+'</span>';
          });
        }
        s += '</div></div>';
        sections.push(s);
      }

      // 事業・R&D示唆
      if(tableCols.strategy){
        const sId = 'tbl-s-'+cat.id+'-'+e;
        let s = '<div style="margin-bottom:.5rem"><div style="font-size:.68rem;font-weight:700;color:var(--text-muted);margin-bottom:.2rem">事業・R&D示唆</div><div class="field-content">';
        d.strategy.forEach(function(st,i){
          var hasD = d.strategyDetail && d.strategyDetail[st];
          if(hasD){
            s += '<span class="strategy-keyword" onclick="toggleAccordion(\''+sId+'-'+i+'\',this)">'+highlightText(st)+'</span>';
            s += '<div class="accordion-story strategy-type" id="'+sId+'-'+i+'"><div class="accordion-story-title">詳細</div>'+highlightText(d.strategyDetail[st])+'</div>';
          } else {
            s += '<span class="strategy-keyword" style="cursor:default;opacity:.7">'+highlightText(st)+'</span>';
          }
        });
        s += '</div></div>';
        sections.push(s);
      }

      // 未充足ニーズ
      if(tableCols.needs){
        const nId = 'tbl-n-'+cat.id+'-'+e;
        let s = '<div style="margin-bottom:.5rem"><div style="font-size:.68rem;font-weight:700;color:var(--text-muted);margin-bottom:.2rem">未充足ニーズ</div><div class="field-content">';
        d.needs.forEach(function(n,i){
          var hasCtx = d.needsContext && d.needsContext[n];
          if(hasCtx){
            s += '<span class="needs-tag" onclick="toggleAccordion(\''+nId+'-'+i+'\',this)">'+highlightText(n)+'</span>';
            s += '<div class="accordion-story needs-type" id="'+nId+'-'+i+'"><div class="accordion-story-title">背景ストーリー</div>'+highlightText(d.needsContext[n])+'</div>';
          } else {
            s += '<span class="needs-tag" style="cursor:default;opacity:.7">'+highlightText(n)+'</span>';
          }
        });
        s += '</div></div>';
        sections.push(s);
      }

      html += sections.join('');
      html += '</td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  tableView.innerHTML = html;
}

// ========== INTERACTIONS ==========
function toggleCategory(el){
  const row = el.closest('.category-row');
  row.classList.toggle('open');
}

// Era filter
document.getElementById('eraFilter').addEventListener('click', e => {
  if(!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('#eraFilter .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeEra = e.target.dataset.era;
  render();
});

// Field filter
document.getElementById('fieldFilter').addEventListener('click', e => {
  if(!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('#fieldFilter .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeField = e.target.dataset.field;
  render();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  render();
});

// View toggle
const heroEl = document.querySelector('.hero');
const fieldFilterEl = document.getElementById('fieldFilter');
const tableColTogglesEl = document.getElementById('tableColToggles');

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    const isTable = currentView === 'table';
    cardView.classList.toggle('active', !isTable);
    tableView.classList.toggle('active', isTable);
    // Hide hero & card area in table view
    heroEl.style.display = isTable ? 'none' : '';
    // Swap field filter (card) ↔ column toggles (table)
    fieldFilterEl.style.display = isTable ? 'none' : '';
    tableColTogglesEl.classList.toggle('active', isTable);
    render();
  });
});

// Table column toggles
tableColTogglesEl.addEventListener('click', e => {
  if(!e.target.classList.contains('col-toggle')) return;
  const col = e.target.dataset.col;
  tableCols[col] = !tableCols[col];
  e.target.classList.toggle('active', tableCols[col]);
  render();
});

// Detail panel
const overlay = document.getElementById('overlay');
const detailPanel = document.getElementById('detailPanel');
document.getElementById('detailClose').addEventListener('click', closeDetail);
overlay.addEventListener('click', closeDetail);

function closeDetail(){
  overlay.classList.remove('active');
  detailPanel.classList.remove('active');
}

function toggleAccordion(id, tagEl){
  const el = document.getElementById(id);
  if(!el) return;
  const isOpen = el.classList.contains('visible');
  // Close all sibling accordions in the same field-content
  const parent = el.closest('.field-content');
  if(parent){
    parent.querySelectorAll('.accordion-story.visible').forEach(s => s.classList.remove('visible'));
    parent.querySelectorAll('.strategy-keyword.active, .needs-tag.active').forEach(t => t.classList.remove('active'));
  }
  // Toggle current
  if(!isOpen){
    el.classList.add('visible');
    if(tagEl) tagEl.classList.add('active');
  }
}

function render(){
  syncStickyOffset();
  renderCards();
  renderTable();
  // Auto-open all categories when searching
  if(searchTerm){
    document.querySelectorAll('.category-row:not(.hidden)').forEach(r => r.classList.add('open'));
  }
}

// Sync sticky header offset with controls bar height
function syncStickyOffset(){
  const ctrl = document.querySelector('.controls');
  if(ctrl){
    const h = ctrl.offsetHeight;
    document.documentElement.style.setProperty('--controls-h', h + 'px');
  }
}
window.addEventListener('resize', syncStickyOffset);

// Initial render
syncStickyOffset();
render();
// Open first category by default
document.querySelector('.category-row')?.classList.add('open');
</script>
</body>
</html>
